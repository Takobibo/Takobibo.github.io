<!-- Game02.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SUPERGO | 秘密对话</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="Game02.css">
</head>
<body>
    <!-- 游戏窗口容器 -->
    <div class="game-container">
        <!-- 蓝色顶部栏 -->
        <div class="top-bar">
            <img src="SUPERGO LOGO.png" alt="SUPERGO" class="top-logo">
            <!-- 喇叭按钮移至右上角，无背景 -->
            <div class="sound-toggle" id="soundToggle">
                <i class="fas fa-volume-up" id="soundIcon"></i>
            </div>
        </div>

        <!-- 场景背景层 -->
        <div class="scene-bg" id="sceneBg"></div>
        
        <!-- 人物图片层（垂直居中） -->
        <div class="character-wrapper" id="characterWrapper">
            <img id="characterImg" class="character-img" src="" alt="Character">
        </div>

        <!-- 对话框区域（固定高度） -->
        <div class="dialogue-box" id="dialogueBox">
            <div class="dialogue-text" id="dialogueText"></div>
        </div>

        <!-- 回答按钮（窗口中央） -->
        <button class="answer-btn" id="answerBtn" style="display: none;">Click to Continue</button>

        <!-- 开始按钮覆盖层 -->
        <div class="start-overlay" id="startOverlay">
            <button class="start-btn" id="startBtn">START</button>
        </div>
    </div>

    <script src="Game02.js"></script>
</body>
</html>
